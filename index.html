<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#F4F6F0;
    --paper-card:#FBFCF9;
    --rule:#C7DAC7;
    --rule-strong:#9FBB9F;
    --margin:#A13D3D;
    --margin-soft:#C77B7B;
    --ink:#202B22;
    --ink-soft:#5E6D5F;
    --ink-faint:#8B968B;
    --gold:#9C6F1E;
    --gold-soft:#EFE0BE;
    --success:#2F6B4F;
    --success-soft:#DCEBE1;
    --danger:#A13D3D;
    --danger-soft:#F3DEDE;
    --shadow: 0 1px 2px rgba(32,43,34,0.06), 0 4px 14px rgba(32,43,34,0.06);
  }
  *{box-sizing:border-box;}
  html{ font-size: clamp(14px, 4.2vw, 17px); }
  body{margin:0;padding:0;background:var(--paper);min-height:100vh;min-height:100dvh;}
  .app{
    font-family:'IBM Plex Sans Thai','IBM Plex Sans',sans-serif;
    font-size:1rem;
    line-height:1.5;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
    color:var(--ink);
    max-width:520px;
    margin:0 auto;
    padding:0 0 calc(96px + env(safe-area-inset-bottom)) 0;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 33px,
        var(--rule) 33px, var(--rule) 34px
      ),
      var(--paper);
  }
  /* ===== Header / Stamp ===== */
  .ledger-head{
    position:sticky; top:0; z-index:30;
    background:var(--paper);
    padding:22px 20px 14px 20px;
    border-bottom:2px solid var(--rule-strong);
  }
  .ledger-head .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.75rem;
    letter-spacing:.1em;
    color:var(--ink-faint);
    text-transform:uppercase;
    margin-bottom:3px;
  }
  .ledger-head h1{
    font-family:'Roboto Slab',serif;
    font-weight:700;
    font-size:1.5rem;
    margin:0 0 14px 0;
    color:var(--ink);
    letter-spacing:-0.01em;
  }
  .summary-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .summary-cell{
    background:var(--paper-card);
    border:1px solid var(--rule-strong);
    border-radius:4px;
    padding:10px 12px;
  }
  .summary-cell .label{
    font-size:0.7812rem; color:var(--ink-soft);
    margin-bottom:4px;
  }
  .summary-cell .value{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:1.0625rem;
    color:var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .summary-cell.warn .value{ color:var(--margin); }

  /* ===== Cards ===== */
  .list{ padding:16px 16px 8px 16px; display:flex; flex-direction:column; gap:14px; }
  .empty-state{
    margin:30px 16px; padding:26px 18px;
    border:1.5px dashed var(--rule-strong);
    border-radius:6px;
    text-align:center;
    color:var(--ink-soft);
    background:var(--paper-card);
  }
  .empty-state .big{ font-family:'Roboto Slab',serif; font-size:1.0625rem; color:var(--ink); margin-bottom:6px; }

  .card{
    position:relative;
    background:var(--paper-card);
    border:1px solid var(--rule-strong);
    border-radius:6px;
    box-shadow:var(--shadow);
    overflow:hidden;
    padding-left:14px;
  }
  .card::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:5px;
    background:var(--margin);
  }
  .card.paid-off::before{ background:var(--success); }

  .card-head{
    display:flex; align-items:flex-start; gap:10px;
    padding:14px 14px 12px 10px;
    cursor:pointer;
    user-select:none;
  }
  .card-head .chevron{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.875rem; color:var(--ink-faint);
    margin-top:4px;
    transition:transform .18s ease;
    flex-shrink:0;
  }
  .card.expanded .chevron{ transform:rotate(90deg); }
  .card-head .titles{ flex:1; min-width:0; }
  .card-head .name{
    font-family:'Roboto Slab',serif; font-weight:700; font-size:1.125rem;
    color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-head .meta{
    font-size:0.8438rem; color:var(--ink-soft); margin-top:3px;
    font-family:'IBM Plex Mono',monospace;
  }
  .card-head .right{ text-align:right; flex-shrink:0; }
  .card-head .bal{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1rem;
    color:var(--ink); font-variant-numeric: tabular-nums;
  }
  .stamp{
    display:inline-block; margin-top:5px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.6875rem; letter-spacing:.05em; text-transform:uppercase;
    padding:3px 8px; border-radius:20px;
    border:1px solid var(--success);
    color:var(--success);
  }
  .stamp.active{ border-color:var(--gold); color:var(--gold); }

  .progress-track{
    height:5px; background:var(--rule); margin:0 14px 12px 10px; border-radius:3px; overflow:hidden;
  }
  .progress-fill{ height:100%; background:var(--gold); }
  .card.paid-off .progress-fill{ background:var(--success); }

  .card-body{
    max-height:0; overflow:hidden;
    transition:max-height .22s ease;
  }
  .card.expanded .card-body{ max-height:3000px; }
  .card-body-inner{ padding:0 14px 16px 10px; border-top:1px dashed var(--rule-strong); }

  .field-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    margin:14px 0 4px 0;
  }
  .field-grid .full{ grid-column:1/3; }
  label{
    display:block; font-size:0.7812rem; color:var(--ink-soft); margin-bottom:5px;
    text-transform:uppercase; letter-spacing:.04em;
  }
  input[type=text], input[type=number], input[type=date]{
    width:100%;
    font-family:'IBM Plex Mono',monospace;
    font-size:16px;
    padding:10px 10px;
    border:1px solid var(--rule-strong);
    border-radius:5px;
    background:#fff;
    color:var(--ink);
  }
  input[type=text]:focus, input[type=number]:focus, input[type=date]:focus{
    outline:2px solid var(--gold-soft); border-color:var(--gold);
  }
  input[type=number]{ -moz-appearance:textfield; appearance:textfield; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{
    -webkit-appearance:none; margin:0;
  }

  .section-label{
    font-family:'Roboto Slab',serif; font-weight:700; font-size:0.9062rem;
    color:var(--ink); margin:18px 0 10px 0;
    display:flex; align-items:center; justify-content:space-between;
  }

  .sched-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -2px; position:relative; }
  .sched-hint{
    font-size:11px; color:var(--ink-faint); text-align:right;
    margin:4px 2px 0 0; font-family:'IBM Plex Sans Thai',sans-serif;
  }
  table.sched{ width:100%; min-width:480px; border-collapse:collapse; font-family:'IBM Plex Mono',monospace; font-size:0.875rem; }
  table.sched th{
    text-align:right; font-weight:600; color:var(--ink-soft);
    border-bottom:1.5px solid var(--rule-strong);
    padding:7px 6px; font-size:0.7188rem; text-transform:uppercase; letter-spacing:.03em;
    white-space:nowrap;
  }
  table.sched th:first-child, table.sched td:first-child{ text-align:left; }
  table.sched td{ padding:7px 6px; border-bottom:1px solid var(--rule); text-align:right; font-variant-numeric: tabular-nums; }
  table.sched input[type=date], table.sched input[type=number]{ padding:6px 6px; font-size:14px; min-width:88px; }
  table.sched tbody tr{ cursor:pointer; -webkit-user-select:none; user-select:none; transition:background-color .15s ease; }
  table.sched td.del-cell{ text-align:center; width:32px; padding:7px 2px; }
  .row-del-btn{
    border:none; background:none; color:var(--margin); font-size:1.05rem; line-height:1;
    cursor:pointer; padding:4px 5px;
  }
  table.sched tbody tr.row-armed{ background-color:var(--danger-soft); }

  tfoot td{
    font-weight:700; border-top:1.5px solid var(--rule-strong); border-bottom:none;
    padding-top:7px; color:var(--ink);
  }

  .btn{
    font-family:'IBM Plex Sans Thai',sans-serif;
    font-size:0.9062rem; font-weight:600;
    border-radius:6px; border:1px solid var(--rule-strong);
    padding:11px 14px; background:#fff; color:var(--ink); cursor:pointer;
  }
  .btn:hover{ background:var(--paper); }
  .btn-add-row{ margin-top:10px; width:100%; border-style:dashed; color:var(--gold); border-color:var(--gold-soft); background:var(--gold-soft); }
  .btn-danger{ color:var(--margin); border-color:var(--margin-soft); }
  .card-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:14px; }

  .fab{
    position:fixed; right:20px; bottom:calc(24px + env(safe-area-inset-bottom)); z-index:40;
    width:56px; height:56px; border-radius:50%;
    background:var(--margin); color:#fff; border:none;
    font-size:1.75rem; line-height:56px; text-align:center;
    box-shadow:0 6px 18px rgba(161,61,61,0.4);
    cursor:pointer;
  }
  .fab:active{ transform:scale(.96); }

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(32,43,34,0.45);
    display:flex; align-items:center; justify-content:center;
    padding:24px; z-index:50;
  }
  .modal{
    background:var(--paper-card); width:100%; max-width:340px;
    border-radius:16px; padding:22px 20px 20px 20px;
    box-shadow:0 12px 34px rgba(0,0,0,0.28);
  }
  .modal h2{
    font-family:'Roboto Slab',serif; font-size:18px; margin:0 0 16px 0;
  }
  .modal label{ font-size:12px; }
  .modal input[type=text], .modal input[type=number]{ font-size:16px; }
  .modal .field-grid{ margin-top:6px; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .modal-actions .btn{ flex:1; text-align:center; font-size:14px; }
  .btn-primary{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .toast{
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%);
    background:var(--ink); color:#fff; font-size:0.875rem;
    padding:10px 18px; border-radius:20px; z-index:60;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .toast.show{ opacity:1; }
</style>

<div class="app" id="app">
  <div class="ledger-head">
    <div class="eyebrow">สมุดบัญชีเจ้าหนี้ · Accounts Payable Ledger</div>
    <h1>บัญชีเจ้าหนี้</h1>
    <div class="summary-row" id="summaryRow"></div>
  </div>
  <div class="list" id="list"></div>
</div>

<button class="fab" id="fabAdd" title="เพิ่มเจ้าหนี้">+</button>
<div class="toast" id="toast"></div>

<script>
(function(){
  const STORE_KEY = 'creditors:all';
  let creditors = [];
  let expanded = new Set();
  let armedRowId = null;
  let loaded = false;

  const el = (sel, root=document) => root.querySelector(sel);
  const fmt = n => (Math.round((n||0)*100)/100).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmtDate = d => { if(!d) return '-'; const dt = new Date(d+'T00:00:00'); return dt.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'2-digit'}); };
  const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

  function toast(msg){
    const t = el('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._h);
    toast._h = setTimeout(()=>t.classList.remove('show'), 1800);
  }

  async function loadData(){
    try{
      const res = await window.storage.get(STORE_KEY, false);
      creditors = res && res.value ? JSON.parse(res.value) : [];
    }catch(e){
      creditors = [];
    }
    loaded = true;
    render();
  }

  async function saveData(){
    try{
      const res = await window.storage.set(STORE_KEY, JSON.stringify(creditors), false);
      if(!res) toast('บันทึกไม่สำเร็จ ลองอีกครั้ง');
    }catch(e){
      toast('บันทึกไม่สำเร็จ: ' + (e && e.message ? e.message : 'error'));
    }
  }

  // schedule = running amortization per Excel logic:
  // interest_i = balanceBefore * (annualRate%/100/12); principal_i = payment - interest_i; balanceAfter = balanceBefore - principal_i
  function computeSchedule(cred){
    let balance = Number(cred.principal)||0;
    const monthlyRate = (Number(cred.rate)||0)/100/12;
    const rows = [];
    const payments = [...(cred.payments||[])].sort((a,b)=> (a.date||'').localeCompare(b.date||''));
    payments.forEach((p,idx)=>{
      const amount = Number(p.amount)||0;
      const interest = balance * monthlyRate;
      const principalPaid = amount === 0 ? 0 : (amount - interest);
      const balanceAfter = amount === 0 ? balance : (balance - principalPaid);
      rows.push({ id:p.id, n:idx+1, date:p.date, amount, interest, principalPaid, balanceAfter });
      balance = balanceAfter;
    });
    const totals = rows.reduce((t,r)=>({
      amount:t.amount+r.amount, interest:t.interest+r.interest, principal:t.principal+r.principalPaid
    }), {amount:0, interest:0, principal:0});
    return { rows, totals, endingBalance: rows.length ? rows[rows.length-1].balanceAfter : (Number(cred.principal)||0) };
  }

  function renderSummary(){
    let totalPrincipal=0, totalRemaining=0, totalInterestPaid=0, count=creditors.length;
    creditors.forEach(c=>{
      const s = computeSchedule(c);
      totalPrincipal += Number(c.principal)||0;
      totalRemaining += s.endingBalance;
      totalInterestPaid += s.totals.interest;
    });
    el('#summaryRow').innerHTML = `
      <div class="summary-cell">
        <div class="label">จำนวนเจ้าหนี้</div>
        <div class="value">${count} ราย</div>
      </div>
      <div class="summary-cell warn">
        <div class="label">คงเหลือทั้งหมด</div>
        <div class="value">฿${fmt(totalRemaining)}</div>
      </div>
      <div class="summary-cell">
        <div class="label">เงินต้นรวม</div>
        <div class="value">฿${fmt(totalPrincipal)}</div>
      </div>
      <div class="summary-cell">
        <div class="label">ดอกเบี้ยจ่ายสะสม</div>
        <div class="value">฿${fmt(totalInterestPaid)}</div>
      </div>`;
  }

  function renderList(){
    const list = el('#list');
    if(!creditors.length){
      list.innerHTML = `<div class="empty-state">
        <div class="big">ยังไม่มีรายการเจ้าหนี้</div>
        กดปุ่ม + ด้านล่างเพื่อเพิ่มเจ้าหนี้รายแรก
      </div>`;
      return;
    }
    list.innerHTML = creditors.map(c => cardHtml(c)).join('');
  }

  function cardHtml(cred){
    const s = computeSchedule(cred);
    const principal = Number(cred.principal)||0;
    const progress = principal>0 ? Math.max(0, Math.min(1, 1 - (s.endingBalance/principal))) : 0;
    const isPaidOff = principal>0 && s.endingBalance<=0.005;
    const isOpen = expanded.has(cred.id);

    const rowsHtml = s.rows.map(r => `
      <tr class="${armedRowId===r.id ? 'row-armed' : ''}" data-row="${r.id}" onclick="LEDGER.toggleArm(event,'${r.id}')">
        <td>${r.n}</td>
        <td><input type="date" value="${r.date||''}" onchange="LEDGER.updatePayment('${cred.id}','${r.id}','date',this.value)"></td>
        <td><input type="number" step="0.01" inputmode="decimal" value="${r.amount}" onchange="LEDGER.updatePayment('${cred.id}','${r.id}','amount',this.value)"></td>
        <td>${fmt(r.interest)}</td>
        <td>${fmt(r.principalPaid)}</td>
        <td>${fmt(r.balanceAfter)}</td>
        <td class="del-cell">${armedRowId===r.id ? `<button class="row-del-btn" title="ลบงวด" onclick="event.stopPropagation(); LEDGER.deletePayment('${cred.id}','${r.id}')">🗑</button>` : ''}</td>
      </tr>`).join('');

    return `
    <div class="card ${isOpen?'expanded':''} ${isPaidOff?'paid-off':''}" data-id="${cred.id}">
      <div class="card-head" onclick="LEDGER.toggle('${cred.id}')">
        <div class="chevron">▶</div>
        <div class="titles">
          <div class="name">${escapeHtml(cred.name || 'ไม่ระบุชื่อ')}</div>
          <div class="meta">เงินต้น ฿${fmt(principal)} · ${Number(cred.rate)||0}%/ปี</div>
        </div>
        <div class="right">
          <div class="bal">฿${fmt(s.endingBalance)}</div>
          <div class="stamp ${isPaidOff?'':'active'}">${isPaidOff?'ปิดบัญชีแล้ว':'ค้างชำระ'}</div>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${(progress*100).toFixed(1)}%"></div></div>
      <div class="card-body">
        <div class="card-body-inner">
          <div class="field-grid">
            <div>
              <label>ชื่อเจ้าหนี้</label>
              <input type="text" value="${escapeHtml(cred.name||'')}" onchange="LEDGER.updateField('${cred.id}','name',this.value)">
            </div>
            <div>
              <label>ดอกเบี้ย %/ปี</label>
              <input type="number" step="0.01" value="${cred.rate||0}" onchange="LEDGER.updateField('${cred.id}','rate',this.value)">
            </div>
            <div class="full">
              <label>เงินต้น (บาท)</label>
              <input type="number" step="0.01" value="${cred.principal||0}" onchange="LEDGER.updateField('${cred.id}','principal',this.value)">
            </div>
          </div>

          <div class="section-label">ตารางผ่อนชำระ</div>
          <div class="sched-scroll">
          <table class="sched">
            <thead><tr>
              <th>งวด</th><th>วันที่</th><th>ยอดผ่อน</th><th>ดอกเบี้ย</th><th>เงินต้น</th><th>คงเหลือ</th><th></th>
            </tr></thead>
            <tbody>${rowsHtml || `<tr><td colspan="7" style="text-align:center;color:var(--ink-faint);padding:10px 0;">ยังไม่มีงวดชำระ</td></tr>`}</tbody>
            <tfoot><tr>
              <td colspan="2">รวม</td>
              <td>${fmt(s.totals.amount)}</td>
              <td>${fmt(s.totals.interest)}</td>
              <td>${fmt(s.totals.principal)}</td>
              <td>${fmt(s.endingBalance)}</td>
              <td></td>
            </tr></tfoot>
          </table>
          </div>
          ${s.rows.length ? `<div class="sched-hint">แตะแถวเพื่อลบงวด</div>` : ''}
          <button class="btn btn-add-row" onclick="LEDGER.addPayment('${cred.id}')">+ เพิ่มงวดชำระ</button>

          <div class="card-actions">
            <button class="btn btn-danger" onclick="LEDGER.deleteCreditor('${cred.id}')">ลบเจ้าหนี้รายนี้</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function render(){
    if(!loaded) return;
    renderSummary();
    renderList();
  }

  function nextDefaultDate(cred){
    const payments = cred.payments||[];
    if(!payments.length) return new Date().toISOString().slice(0,10);
    const sorted = [...payments].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const last = new Date(sorted[sorted.length-1].date+'T00:00:00');
    last.setMonth(last.getMonth()+1);
    return last.toISOString().slice(0,10);
  }

  window.LEDGER = {
    toggle(id){
      if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
      render();
    },
    updateField(id, field, value){
      const c = creditors.find(x=>x.id===id);
      if(!c) return;
      c[field] = (field==='name') ? value : Number(value);
      saveData(); render();
    },
    addPayment(id){
      const c = creditors.find(x=>x.id===id);
      if(!c) return;
      c.payments = c.payments || [];
      c.payments.push({ id: uid(), date: nextDefaultDate(c), amount: 0 });
      saveData(); render();
    },
    updatePayment(credId, payId, field, value){
      const c = creditors.find(x=>x.id===credId);
      if(!c) return;
      const p = (c.payments||[]).find(x=>x.id===payId);
      if(!p) return;
      p[field] = field==='amount' ? Number(value) : value;
      saveData(); render();
    },
    toggleArm(event, payId){
      if(event.target.closest('input')) return;
      armedRowId = (armedRowId === payId) ? null : payId;
      render();
    },
    deletePayment(credId, payId){
      const c = creditors.find(x=>x.id===credId);
      if(!c) return;
      c.payments = (c.payments||[]).filter(x=>x.id!==payId);
      if(armedRowId===payId) armedRowId = null;
      saveData(); render();
    },
    deleteCreditor(id){
      if(!confirm('ลบเจ้าหนี้รายนี้และประวัติการผ่อนชำระทั้งหมด?')) return;
      creditors = creditors.filter(x=>x.id!==id);
      expanded.delete(id);
      saveData(); render();
      toast('ลบรายการแล้ว');
    },
    openAddModal(){
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.id = 'addModal';
      backdrop.innerHTML = `
        <div class="modal">
          <h2>เพิ่มเจ้าหนี้ใหม่</h2>
          <div class="field-grid">
            <div class="full">
              <label>ชื่อเจ้าหนี้</label>
              <input type="text" id="newName" placeholder="เช่น นายสมชาย ใจดี">
            </div>
            <div>
              <label>เงินต้น (บาท)</label>
              <input type="number" step="0.01" id="newPrincipal" placeholder="0.00">
            </div>
            <div>
              <label>ดอกเบี้ย %/ปี</label>
              <input type="number" step="0.01" id="newRate" placeholder="0">
            </div>
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="LEDGER.closeAddModal()">ยกเลิก</button>
            <button class="btn btn-primary" onclick="LEDGER.confirmAdd()">เพิ่มเจ้าหนี้</button>
          </div>
        </div>`;
      document.body.appendChild(backdrop);
      setTimeout(()=>{ const n = el('#newName'); if(n) n.focus(); }, 50);
    },
    closeAddModal(){
      const m = el('#addModal');
      if(m) m.remove();
    },
    confirmAdd(){
      const name = el('#newName').value.trim();
      const principal = Number(el('#newPrincipal').value)||0;
      const rate = Number(el('#newRate').value)||0;
      if(!name){ toast('กรุณาระบุชื่อเจ้าหนี้'); return; }
      const id = uid();
      creditors.push({ id, name, principal, rate, payments: [] });
      expanded.add(id);
      LEDGER.closeAddModal();
      saveData(); render();
      toast('เพิ่มเจ้าหนี้เรียบร้อย');
    }
  };

  el('#fabAdd').addEventListener('click', ()=>LEDGER.openAddModal());

  // Tapping outside any schedule row disarms the currently-armed (red) row
  document.addEventListener('click', (e)=>{
    if(armedRowId && !e.target.closest('tr[data-row]')){
      armedRowId = null;
      render();
    }
  });

  loadData();
})();
</script>
